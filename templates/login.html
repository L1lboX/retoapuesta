{% extends 'base.html' %}

{% block content %}
<h1>Ingresar</h1>

<div class="card" style="max-width:400px; margin:0 auto">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>
    {% if form.errors %}
        <p style="color:red; margin-top:1rem">Email o contraseña incorrectos.</p>
    {% endif %}
    <p style="margin-top:1rem">¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
</div>
{% endblock %}
